name: Daily DB Backup

on:
  schedule:
    # Runs daily at 2AM UTC (3AM WAT Nigeria time)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" > backup_$TIMESTAMP.sql
          gzip backup_$TIMESTAMP.sql
          echo "Backup created: backup_$TIMESTAMP.sql.gz"
          ls -lh *.sql.gz

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: molek-db-backup-${{ github.run_number }}
          path: "*.sql.gz"
          retention-days: 30
